<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="robot">
        <img src="Project.Robot.png" id="robot.Img">
    </div>

<div id="projectsScreen" class="screen">
    <h1 class="pageTitle">Mina Quiz</h1>
    <div class="projectList"></div>
    <button class="mainBtn" onclick="showScreen('createQuizScreen')">Skapa nytt Quiz</button>
</div>

<div id="createQuizScreen" class="screen hidden">
    <h1 class="pageTitle">Skapa Quiz</h1>
    <input type="text" id="quizTitle" placeholder="Quiz titel">
    <p id="questionCounter">Frågor skapade: 0</p>
    <button class="mainBtn" onclick="showScreen('createQuestionScreen')">Lägg till fråga</button>
    <button class="mainBtn" onclick="saveQuiz()">Spara Quiz</button>
    <button class="mainBtn" onclick="cancelQuiz()">Tillbaka</button>
</div>

<div id="createQuestionScreen" class="screen hidden">
    <h1 class="pageTitle">Ny Fråga</h1>
    <input type="text" id="questionInput" placeholder="Fråga...">
    <input type="text" id="answer1" placeholder="Svar 1">
    <input type="text" id="answer2" placeholder="Svar 2">
    <input type="text" id="answer3" placeholder="Svar 3">
    <input type="text" id="answer4" placeholder="Svar 4">
    <button class="mainBtn" onclick="addQuestion()">Spara fråga</button>
    <button class="mainBtn" onclick="showScreen('createQuizScreen')">Tillbaka</button>
</div>

<div id="playScreen" class="screen hidden">
    <h1 id="playTitle" class="pageTitle"></h1>
    <h2 id="playQuestion"></h2>
    <div id="playAnswers"></div>
    <p id="questionProgress"></p>
    <button class="mainBtn" onclick="nextQuestion()">Nästa</button>
    <button class="mainBtn" onclick="showScreen('projectsScreen')">Avsluta</button>
</div>

<script src="index.js"></script>
</body>
</html>
