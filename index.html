<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Avatar Quiz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- ROBOT -->
    <div class="robot">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" id="robotImg">
    </div>

    <!-- START SKÄRM -->
    <div id="startScreen" class="screen start-layout">
        <h1 class="title">AVATAR</h1>

        <div class="button-group">
            <button class="mainBtn" onclick="showScreen('projectsScreen')">Logga in</button>
            <button class="mainBtn" onclick="showScreen('projectsScreen')">Gäst</button>
        </div>

        <div class="gear">⚙</div>
    </div>

    <!-- QUIZ LISTA -->
    <div id="projectsScreen" class="screen hidden">
        <h1 class="pageTitle">Programmering Quiz</h1>
        <div class="computerIcon">💻</div>

        <div class="projectList">
            <div class="projectCard" onclick="showScreen('createQuestionScreen')">
                <span>C# Grundkurs</span>
                <span class="arrow">›</span>
            </div>

            <div class="projectCard" onclick="showScreen('createQuestionScreen')">
                <span>Variabler Quiz</span>
                <span class="arrow">›</span>
            </div>
        </div>

        <button class="fab" onclick="showScreen('createQuestionScreen')">+</button>
    </div>

    <!-- SKAPA QUIZ -->
    <div id="createQuestionScreen" class="screen hidden">
        <h1 class="pageTitle">Skapa Quiz</h1>

        <input id="quizTitle" class="answerInput" placeholder="Quiz titel...">

        <input class="answerInput" placeholder="Fråga...">
        <input class="answerInput" placeholder="Svar 1...">
        <input class="answerInput" placeholder="Svar 2...">
        <input class="answerInput" placeholder="Svar 3...">
        <input class="answerInput" placeholder="Svar 4...">

        <button class="saveBtn" onclick="saveQuestion()">Spara</button>
        <button class="mainBtn" onclick="showScreen('emptyCreateScreen')">Tomma fält</button>
        <button class="mainBtn" onclick="showScreen('projectsScreen')">Tillbaka</button>
    </div>


</div>

<script src="index.js"></script>
</body>
</html>
