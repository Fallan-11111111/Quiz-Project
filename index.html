<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Quiz - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="robotContainer" class="robot">
    <div id="robotEffects" class="effect-container"></div>
    <div class="speech-bubble" id="robotSpeech" style="display: none;">Välkommen!</div>
    <img src="Project.Robot.png" alt="robot" id="robotImg">
</div>

<div id="startScreen" class="screen">
    <div class="hero-section">
        <h1 class="title">AVATAR <span class="subtitle">QUIZ SYSTEM</span></h1>
        <div class="button-group">
            <button class="mainBtn gold" onclick="showScreen('projectsScreen')">Starta Spelet</button>
            <button class="mainBtn outline" onclick="alert('Login kommer i framtida version!')">Logga in</button>
        </div>
    </div>
</div>

<div id="projectsScreen" class="screen hidden">
    <div class="glass-panel">
        <h1 class="pageTitle">Mitt Bibliotek</h1>
        <div class="projectList" id="projectList"></div>
    </div>
    <button class="fab" title="Skapa nytt quiz" onclick="showScreen('createQuizScreen')">+</button>
</div>

<div id="createQuizScreen" class="screen hidden">
    <div class="formCard">
        <h2 class="cardTitle">Skapa Nytt Quiz</h2>
        <input type="text" id="quizTitle" class="techInput" placeholder="Ange Quiz Titel...">
        <div class="stats-row">
            <span id="questionCounter">Antal frågor i detta quiz: 0</span>
        </div>
        <div class="formButtons">
            <button class="mainBtn gold" onclick="showScreen('createQuestionScreen')">+ Lägg till Fråga</button>
            <button class="mainBtn" onclick="saveQuiz()">Slutför & Spara</button>
            <button class="backBtn" onclick="cancelQuiz()">Avbryt</button>
        </div>
    </div>
</div>

<div id="createQuestionScreen" class="screen hidden">
    <div class="formCard">
        <h2 class="cardTitle">Designa Fråga</h2>
        <input type="text" id="questionInput" class="techInput" placeholder="Skriv din fråga här...">
        
        <p style="font-size: 0.9em; color: rgba(255,255,255,0.7); margin-bottom: 5px;">
            Fyll i minst 2 alternativ. Markera rätt svar till vänster.
        </p>

        <div class="answersGrid" id="dynamicAnswers">
            <div class="answer-row">
                <input type="radio" name="correctRadio" value="0" checked title="Markera som rätt svar">
                <input type="text" id="ans0" class="techInput answerInput" placeholder="Svarsalternativ 1 (Krävs)">
            </div>
            <div class="answer-row">
                <input type="radio" name="correctRadio" value="1" title="Markera som rätt svar">
                <input type="text" id="ans1" class="techInput answerInput" placeholder="Svarsalternativ 2 (Krävs)">
            </div>
            <div class="answer-row">
                <input type="radio" name="correctRadio" value="2" title="Markera som rätt svar">
                <input type="text" id="ans2" class="techInput answerInput" placeholder="Svarsalternativ 3 (Frivilligt)">
            </div>
            <div class="answer-row">
                <input type="radio" name="correctRadio" value="3" title="Markera som rätt svar">
                <input type="text" id="ans3" class="techInput answerInput" placeholder="Svarsalternativ 4 (Frivilligt)">
            </div>
        </div>

        <div class="formButtons" style="margin-top: 20px;">
            <button class="mainBtn gold" onclick="addQuestion()">Spara Fråga</button>
            <button class="backBtn" onclick="showScreen('createQuizScreen')">Tillbaka</button>
        </div>
    </div>
</div>

<div id="playScreen" class="screen hidden">
    <div class="playCard">
        <div class="playHeader">
            <h3 id="playTitle"></h3>
            <div id="scoreDisplay">Poäng: 0</div>
        </div>
        
        <div class="timer-container">
            <div id="timerFill"></div>
        </div>

        <div class="progress-bar"><div id="progressFill"></div></div>
        
        <h2 id="playQuestion"></h2>
        <div id="playAnswers" class="answersPlay"></div>
        <div class="playFooter">
            <button class="mainBtn" id="nextBtn" onclick="nextQuestion()" disabled>Nästa Fråga</button>
        </div>
    </div>
</div>

<div id="resultScreen" class="screen hidden">
    <div class="formCard centered">
        <h1 class="cardTitle">Resultat!</h1>
        <div class="final-score" id="finalScoreDisplay">0/0</div>
        <p id="resultMessage"></p>
        <button class="mainBtn gold" onclick="showScreen('projectsScreen')">Tillbaka till biblioteket</button>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
